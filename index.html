                });
                setIconosValorant(mapaDeIconos);
              }).catch(err => console.error(err));

            fetch('https://valorant-api.com/v1/competitivetiers')
              .then(res => res.json())
              .then(data => {
                const episodioActual = data.data[data.data.length - 1];
                const mapaDeRangos = {};
                episodioActual.tiers.forEach(t => {
                  if (t.tierName === 'RADIANT' || t.tierName.includes('3')) {
                    const nombreBase = t.tierName.split(' ')[0]; 
                    const nombreFormateado = nombreBase.charAt(0) + nombreBase.toLowerCase().slice(1);
                    mapaDeRangos[nombreFormateado] = t.largeIcon;
                  }
                });
                setRangosValorant(mapaDeRangos);
              }).catch(err => console.error(err));

            fetch('https://ddragon.leagueoflegends.com/api/versions.json')
              .then(res => res.json())
              .then(data => setVersionLol(data[0])).catch(err => console.error(err));
          }, []);

          const handleOpenChat = (perfil) => {
              setChatActivo(perfil);
              setVistaActual('chat');
          };

          const handleEnviarMensaje = (perfilId, texto) => {
              setHistorialChats(prev => ({
                  ...prev,
                  [perfilId]: [...(prev[perfilId] || []), { text: texto, isMine: true }]
              }));
          };

          return (
            /* NOTE: Added "scale-wrapper" class here */
            <div className="min-h-screen bg-[#1e1f22] text-slate-200 font-sans flex justify-center selection:bg-indigo-500/30 scale-wrapper">
              
              /* NOTE: Added "scale-container" class here */
              <div className="w-full max-w-5xl bg-[#2b2d31] min-h-screen flex flex-col relative shadow-2xl overflow-hidden border-x border-[#1e1f22] scale-container">
                
                <header className="h-14 border-b border-zinc-800 flex items-center justify-between px-4 shrink-0 bg-[#2b2d31] z-20">
                  <div className="flex items-center gap-8">
                      <div className="flex items-center gap-2">
                        <i className="fa-solid fa-gamepad text-indigo-400 text-xl"></i>
                        <h1 className="font-bold text-white tracking-wide text-lg">RankMate</h1>
                      </div>
                      <nav className="hidden sm:flex gap-6">
                        <button onClick={() => setVistaActual('discover')} className={`text-sm font-bold transition-colors ${vistaActual === 'discover' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>Discover</button>
                        <button onClick={() => setVistaActual('chat')} className={`text-sm font-bold transition-colors ${vistaActual === 'chat' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>Chats</button>
                        <button onClick={() => setVistaActual('editor')} className={`text-sm font-bold transition-colors ${vistaActual === 'editor' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>My Profile</button>
                      </nav>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 relative hide-scrollbar flex justify-center items-center">
                  <div className="w-full h-full max-w-5xl">
                    {vistaActual === 'editor' && (
                        <EditorMultiplesPerfiles cuenta={cuenta} setCuenta={setCuenta} iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} />
                    )}
                    {vistaActual === 'discover' && (
                        <DescubrirPerfiles perfiles={MOCK_PROFILES} iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} onSendMessage={handleOpenChat} />
                    )}
                    {vistaActual === 'chat' && chatActivo && (
                        <VistaChat perfil={chatActivo} mensajes={historialChats[chatActivo.id] || []} onEnviar={handleEnviarMensaje} onVolver={() => setVistaActual('discover')} />
                    )}
                    {vistaActual === 'chat' && !chatActivo && (
                        <div className="flex flex-col items-center justify-center h-full text-zinc-500 gap-4 mt-20">
                            <i className="fa-solid fa-messages text-4xl"></i>
                            <p>Select a profile from Discover to start chatting.</p>
                        </div>
                    )}
                  </div>
                </main>

                <div className="sm:hidden flex border-t border-zinc-800 bg-[#2b2d31] p-3 justify-around z-20">
                    <button onClick={() => setVistaActual('discover')} className={`flex flex-col items-center ${vistaActual === 'discover' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-compass mb-1"></i><span className="text-[10px] font-bold">Discover</span></button>
                    <button onClick={() => setVistaActual('chat')} className={`flex flex-col items-center ${vistaActual === 'chat' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-message mb-1"></i><span className="text-[10px] font-bold">Chats</span></button>
                    <button onClick={() => setVistaActual('editor')} className={`flex flex-col items-center ${vistaActual === 'editor' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-user mb-1"></i><span className="text-[10px] font-bold">Profile</span></button>
                </div>

              </div>
            </div>
          );
        }

        function DescubrirPerfiles({ perfiles, iconosValorant, rangosValorant, versionLol, onSendMessage }) {
            const [indice, setIndice] = useState(0);

            if (indice >= perfiles.length) return <div className="text-center text-zinc-500 mt-20">No more profiles to discover!</div>;

            const perfilActual = perfiles[indice];
            const perfilSiguiente = perfiles[indice + 1];

            const handleNext = () => {
                if (indice < perfiles.length - 1) setIndice(indice + 1);
            };

            return (
                <div className="flex gap-4 sm:gap-10 justify-center items-center h-full pt-4 sm:pt-0">
                    <div className="relative z-10 w-full max-w-[340px]">
                        <RenderizadoDePerfil 
                            perfil={perfilActual} 
                            usuarioBase={perfilActual.gamerTag.split('#')[0]} 
                            estado="online" 
                            iconosValorant={iconosValorant} 
                            rangosValorant={rangosValorant} 
                            versionLol={versionLol} 
                            onSendMessage={() => onSendMessage(perfilActual)} 
                        />
                    </div>

                    {perfilSiguiente && (
                        <div className="hidden sm:block relative w-full max-w-[340px] transition-all duration-300">
                             <div className="opacity-40 pointer-events-none">
                                <RenderizadoDePerfil 
                                    perfil={perfilSiguiente} 
                                    usuarioBase={perfilSiguiente.gamerTag.split('#')[0]} 
                                    estado="idle" 
                                    iconosValorant={iconosValorant} 
                                    rangosValorant={rangosValorant} 
                                    versionLol={versionLol} 
                                />
                             </div>
                             <button 
                                onClick={(e) => { e.stopPropagation(); handleNext(); }} 
                                className="absolute inset-0 m-auto w-16 h-16 bg-zinc-900/90 rounded-full flex items-center justify-center text-white text-3xl hover:bg-zinc-800 hover:scale-110 transition-all z-50 shadow-2xl border border-zinc-700">
                                 <i className="fa-solid fa-chevron-right ml-1"></i>
                             </button>
                        </div>
                    )}
                </div>
            );
        }

        function VistaChat({ perfil, mensajes, onEnviar, onVolver }) {
            const [texto, setTexto] = useState("");
            const mensajesEndRef = React.useRef(null);

            useEffect(() => {
                mensajesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [mensajes]);

            const handleSend = () => {
                if(!texto.trim()) return;
                onEnviar(perfil.id, texto);
                setTexto("");
            };

            return (
                <div className="flex flex-col h-full lg:h-[800px] w-full max-w-2xl mx-auto bg-[#1e1f22] rounded-xl border border-zinc-800 overflow-hidden shadow-2xl mt-2 lg:mt-6">
                    <div className="px-5 py-4 border-b border-zinc-800 bg-[#2b2d31] flex items-center gap-4">
                        <button onClick={onVolver} className="text-zinc-400 hover:text-white mr-2 transition-colors">
                           <i className="fa-solid fa-arrow-left text-lg"></i>
                        </button>
                        <div className="relative">
                            <img src={perfil.avatarUrl} className="w-10 h-10 rounded-full object-cover border-2 border-zinc-700" />
                            <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#2b2d31]"></div>
                        </div>
                        <h3 className="text-white font-bold text-lg">{perfil.gamerTag}</h3>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {mensajes.length === 0 ? (
                            <div className="text-center text-zinc-500 mt-10 text-sm">
                                No messages yet. Say hi to {perfil.gamerTag.split('#')[0]}!
                            </div>
                        ) : (
                            mensajes.map((msg, i) => (
                                <div key={i} className={`flex ${msg.isMine ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`px-4 py-2.5 rounded-2xl max-w-[75%] text-sm shadow-sm ${msg.isMine ? 'bg-indigo-500 text-white rounded-br-none' : 'bg-[#2b2d31] text-zinc-200 rounded-bl-none border border-zinc-700/50'}`}>
                                        {msg.text}
                                    </div>
                                </div>
                            ))
                        )}
                        <div ref={mensajesEndRef} />
                    </div>

                    <div className="p-4 bg-[#2b2d31] border-t border-zinc-800">
                        <div className="flex items-center gap-3 bg-[#1e1f22] rounded px-4 py-3 border border-zinc-700 focus-within:border-indigo-500 transition-colors">
                            <input
                                type="text"
                                value={texto}
                                onChange={(e) => setTexto(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="Send message"
                                className="flex-1 bg-transparent outline-none text-zinc-200 text-sm placeholder:text-zinc-500 font-medium"
                            />
                            <button onClick={handleSend} className="text-zinc-400 hover:text-white w-7 h-7 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700 transition-colors shrink-0">
                                <i className="fa-solid fa-chevron-right text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            )
        }

        function EditorMultiplesPerfiles({ cuenta, setCuenta, iconosValorant, rangosValorant, versionLol }) {
           const [idPerfilActivo, setIdPerfilActivo] = useState(cuenta.perfiles[0]?.id || null);

          const manejarAgregarPerfil = () => {
            const nuevoId = `prof_${Date.now()}`;
            const nuevoPerfil = {
              id: nuevoId, game: "League of Legends", gamerTag: "NewPlayer#123",
              avatarUrl: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&q=80",
              bannerUrl: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&q=80",
              frame: "None", rank: "Iron", region: "NA", primaryRole: "Fill", mainChamps: "", aboutMe: "Ready to play.", badges: []
            };
            setCuenta({ ...cuenta, perfiles: [...cuenta.perfiles, nuevoPerfil] });
            setIdPerfilActivo(nuevoId);
          };

          const perfilActivo = cuenta.perfiles.find(p => p.id === idPerfilActivo);

          const actualizarPerfilActivo = (cambios) => {
            setCuenta({ ...cuenta, perfiles: cuenta.perfiles.map(p => p.id === idPerfilActivo ? { ...p, ...cambios } : p) });
          };

          const manejarEliminarPerfil = () => {
            if (cuenta.perfiles.length <= 1) return;
            const perfilesNuevos = cuenta.perfiles.filter(p => p.id !== idPerfilActivo);
            setCuenta({ ...cuenta, perfiles: perfilesNuevos });
            setIdPerfilActivo(perfilesNuevos[0].id);
          };

          const manejarSubidaImagen = (e, campo) => {
            const archivo = e.target.files[0];
            if (archivo) {
              const lector = new FileReader();
              lector.onloadend = () => { actualizarPerfilActivo({ [campo]: lector.result }); };
              lector.readAsDataURL(archivo);
            }
          };

          return (
            <div className="space-y-6 w-full max-w-5xl mx-auto pb-10">
              <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                {cuenta.perfiles.map(p => (
                  <button key={p.id} onClick={() => setIdPerfilActivo(p.id)} className={`px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${idPerfilActivo === p.id ? 'bg-indigo-500 text-white' : 'bg-[#1e1f22] text-zinc-400 hover:text-zinc-200'}`}>
                    <div className="w-4 h-4 rounded-full overflow-hidden bg-[#2b2d31] flex-shrink-0"><img src={GAMES_DATA[p.game].logo} className="w-full h-full object-cover" /></div>
                    {p.game}
                  </button>
                ))}
                <button onClick={manejarAgregarPerfil} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-[#1e1f22] text-green-400 hover:bg-green-500/10 transition-colors flex items-center gap-1">
                  <i className="fa-solid fa-plus"></i> Add Game
                </button>
              </div>

              {perfilActivo ? (
                <div className="flex flex-col lg:flex-row gap-6 items-start">
                  <div className="w-full lg:w-[340px] shrink-0 pointer-events-none lg:sticky lg:top-4 mx-auto lg:mx-0">
                    <RenderizadoDePerfil perfil={perfilActivo} usuarioBase={cuenta.nombreUsuarioBase} estado="online" iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} onSendMessage={() => {}} />
                  </div>

                  <div className="flex-1 w-full bg-[#1e1f22] rounded-xl p-5 space-y-5 shadow-lg">
                    <div className="flex items-center justify-between mb-2 border-b border-zinc-800 pb-2">
                      <div className="flex items-center gap-2">
                        <i className="fa-solid fa-gear text-zinc-400"></i><h3 className="text-sm font-bold text-zinc-200 uppercase">Edit Profile</h3>
                      </div>
                      {cuenta.perfiles.length > 1 && (<button onClick={manejarEliminarPerfil} className="text-red-400 hover:text-red-300 p-1"><i className="fa-solid fa-trash"></i></button>)}
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Game</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.game} onChange={(e) => { const nj = e.target.value; const dj = GAMES_DATA[nj]; actualizarPerfilActivo({ game: nj, rank: dj.ranks[0].name, region: dj.regions[0], primaryRole: dj.roles[0], mainChamps: "" }); }}>
                          {Object.keys(GAMES_DATA).map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">In-Game Tag</label>
                        <input type="text" className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.gamerTag} onChange={(e) => actualizarPerfilActivo({ gamerTag: e.target.value })} placeholder="e.g. Faker#KR1" />
                      </div>
                    </div>

                    <div className="space-y-3">
                      <label className="text-xs font-bold text-zinc-400 uppercase block">Visuals</label>
                      <div className="grid grid-cols-1 gap-3">
                        <div><label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Avatar Image</label><input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded-md p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 cursor-pointer" onChange={(e) => manejarSubidaImagen(e, 'avatarUrl')} /></div>
                        <div><label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Banner Image</label><input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded-md p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 cursor-pointer" onChange={(e) => manejarSubidaImagen(e, 'bannerUrl')} /></div>
                        <div><label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Avatar Frame</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.frame} onChange={(e) => actualizarPerfilActivo({ frame: e.target.value })}>{Object.keys(AVATAR_FRAMES).map(f => <option key={f} value={f}>{f} Frame</option>)}</select></div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Rank</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.rank} onChange={(e) => actualizarPerfilActivo({ rank: e.target.value })}>{GAMES_DATA[perfilActivo.game].ranks.map(r => <option key={r.name} value={r.name}>{r.name}</option>)}</select></div>
                      <div><label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Region / Server</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.region} onChange={(e) => actualizarPerfilActivo({ region: e.target.value })}>{GAMES_DATA[perfilActivo.game].regions.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                      <div><label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Primary Role</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm" value={perfilActivo.primaryRole} onChange={(e) => actualizarPerfilActivo({ primaryRole: e.target.value })}>{GAMES_DATA[perfilActivo.game].roles.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                    </div>

                    {GAMES_DATA[perfilActivo.game].characters && (
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-2 block">Champs / Agents (Max 4)</label>
                        <div className="flex flex-wrap gap-2 mb-3">
                          {perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean).map(champ => (
                            <div key={champ} className="bg-[#1e1f22] border border-zinc-700 rounded-md px-2 py-1 text-xs text-zinc-300 flex items-center gap-1.5 shadow-sm">
                              {champ} <button onClick={() => { const nac = perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean).filter(c => c !== champ).join(','); actualizarPerfilActivo({ mainChamps: nac }); }} className="text-zinc-500 hover:text-red-400"><i className="fa-solid fa-xmark"></i></button>
                            </div>
                          )) : null}
                        </div>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm cursor-pointer" value="" onChange={(e) => { const v = e.target.value; if (!v) return; const cur = perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean) : []; if (cur.length >= 4 || cur.includes(v)) return; actualizarPerfilActivo({ mainChamps: [...cur, v].join(',') }); }}>
                          <option value="">+ Add...</option>
                          {GAMES_DATA[perfilActivo.game].characters.filter(c => !(perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(n => n.trim()).filter(Boolean) : []).includes(c)).map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    )}
                    <div>
                      <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Bio</label>
                      <textarea className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 resize-none h-16 text-sm" value={perfilActivo.aboutMe} onChange={(e) => actualizarPerfilActivo({ aboutMe: e.target.value })} />
                    </div>
                  </div>
                </div>
              ) : (<div className="text-center text-zinc-500 py-10">No game profile selected.</div>)}
            </div>
          );
        }

        function RenderizadoDePerfil({ perfil, usuarioBase, estado, iconosValorant, rangosValorant, versionLol, onSendMessage }) {
          const datosJuego = GAMES_DATA[perfil.game];
          const objetoRango = datosJuego.ranks.find(r => r.name === perfil.rank) || datosJuego.ranks[0];
          const cssMarco = AVATAR_FRAMES[perfil.frame] || "";
          let imagenRangoActual = objetoRango.img;
          if (perfil.game === "Valorant" && rangosValorant && rangosValorant[perfil.rank]) imagenRangoActual = rangosValorant[perfil.rank];
          
          const obtenerColorEstado = (s) => {
            switch(s) { case 'online': return 'bg-green-500'; case 'dnd': return 'bg-red-500'; case 'idle': return 'bg-yellow-500'; default: return 'bg-zinc-500'; }
          };

          if (perfil.game === "League of Legends") {
            return (
              <div className="w-full max-w-[340px] bg-[#010a13] rounded-[4px] shadow-2xl overflow-hidden text-zinc-300 text-sm border-2 border-[#c8aa6e]/30 mx-auto relative group">
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 mix-blend-luminosity" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#010a13]" />
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-full border-[2px] border-[#c8aa6e] bg-[#010a13] p-1 relative ${cssMarco} shadow-xl`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-full" />
                    <div className={`absolute bottom-1 right-1 w-5 h-5 rounded-full border-[2px] border-[#010a13] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-xl font-bold text-[#f0e6d2] mt-3 tracking-wide">{perfil.gamerTag}</h2>
                  <p className="text-xs text-[#c8aa6e]">aka {usuarioBase}</p>
                  <div className="mt-3 flex items-center gap-1.5 border border-[#c8aa6e]/50 bg-[#010a13]/80 px-3 py-1 rounded-full">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-4 h-4" />
                     <span className="text-[10px] font-bold text-[#c8aa6e] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-32 drop-shadow-[0_0_20px_rgba(200,170,110,0.3)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[4]" /></div>
                     <div className="font-black text-transparent bg-clip-text bg-gradient-to-b from-[#f0e6d2] to-[#c8aa6e] text-xl uppercase tracking-[0.2em] mt-2 drop-shadow-md">{objetoRango.name}</div>
                     <div className="text-[10px] text-[#a09b8c] tracking-widest mt-1 uppercase">{perfil.region} Server</div>
                  </div>
                  <div className="mt-6 w-full text-center px-4">
                    <p className="text-xs italic text-[#a09b8c] leading-relaxed relative inline-block">
                       <span className="text-2xl text-[#c8aa6e]/30 absolute -top-3 -left-4">"</span>{perfil.aboutMe}<span className="text-2xl text-[#c8aa6e]/30 absolute -bottom-4 -right-4">"</span>
                    </p>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-6 py-3 rounded border border-[#c8aa6e] bg-[#c8aa6e]/10 hover:bg-[#c8aa6e]/20 text-[#f0e6d2] font-bold text-xs uppercase tracking-widest transition-colors flex items-center justify-center gap-2 pointer-events-auto">
                     <i className="fa-solid fa-message"></i> Send Message
                  </button>
                </div>
              </div>
            );
          }

          if (perfil.game === "Counter-Strike 2") {
            return (
              <div className="w-full max-w-[340px] bg-[#161719] rounded-sm shadow-[0_0_25px_rgba(0,0,0,0.9)] overflow-hidden text-zinc-300 text-sm border-[3px] border-[#2a2c31] mx-auto relative group font-mono">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-orange-500 z-20" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 grayscale sepia-[.2]" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#161719]" />
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-md border-[2px] border-orange-500 bg-[#161719] p-1 relative shadow-[0_0_15px_rgba(249,115,22,0.15)] ${cssMarco}`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-sm grayscale-[0.2]" />
                    <div className={`absolute -bottom-2 -right-2 w-5 h-5 rounded-sm border-[2px] border-[#161719] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-2xl font-black text-white mt-4 tracking-tight uppercase flex items-center gap-2">
                     <i className="fa-brands fa-steam text-zinc-500 text-lg"></i>{perfil.gamerTag}
                  </h2>
                  <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">ID: {usuarioBase}</p>
                  <div className="mt-4 flex items-center gap-2 border border-orange-500/30 bg-orange-500/10 px-4 py-1.5 rounded-sm shadow-inner">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} csSize="text-lg" />
                     <span className="text-xs font-bold text-orange-500 uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-24 flex items-center justify-center drop-shadow-[0_5px_10px_rgba(0,0,0,0.8)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.3]" /></div>
                     <div className="font-black text-zinc-200 text-xl uppercase tracking-widest mt-4 drop-shadow-md">{objetoRango.name}</div>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-6 py-3.5 bg-zinc-800 hover:bg-orange-600 text-zinc-300 hover:text-white border-2 border-zinc-700 hover:border-orange-500 font-black text-[11px] uppercase tracking-widest transition-all duration-200 flex items-center justify-center gap-2 rounded-sm shadow-lg pointer-events-auto">
                     <i className="fa-solid fa-microphone-lines"></i> CONNECT TO LOBBY
                  </button>
                </div>
              </div>
            );
          }

          if (perfil.game === "Valorant") {
            return (
              <div className="w-full max-w-[340px] bg-[#0f1923] rounded-none shadow-[0_0_30px_rgba(255,70,85,0.15)] overflow-hidden text-[#ece8e1] text-sm border border-[#ff4655]/30 mx-auto relative group font-sans">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-[#ff4655] z-20" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-30 mix-blend-luminosity grayscale" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#0f1923]" />
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-tl-lg rounded-tr-lg rounded-bl-lg rounded-br-[32px] border-[2px] border-[#ff4655] bg-[#0f1923] p-1 relative ${cssMarco} shadow-[0_0_15px_rgba(255,70,85,0.2)]`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-tl-md rounded-tr-md rounded-bl-md rounded-br-[28px]" />
                    <div className={`absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-[2px] border-[#0f1923] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-2xl font-black text-[#ece8e1] mt-4 tracking-widest uppercase flex items-center gap-1">
                     {perfil.gamerTag.split('#')[0]}<span className="text-[#ff4655] text-sm">#{perfil.gamerTag.split('#')[1]}</span>
                  </h2>
                  <div className="mt-4 flex items-center gap-2 border border-[#ff4655]/50 bg-[#ff4655]/10 px-4 py-1.5 rounded-sm">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-5 h-5" />
                     <span className="text-xs font-black text-[#ece8e1] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-32 drop-shadow-[0_0_25px_rgba(255,255,255,0.1)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.15]" /></div>
                     <div className="font-black text-white text-2xl uppercase tracking-[0.15em] mt-3 drop-shadow-md">{objetoRango.name}</div>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-6 py-3.5 bg-[#ff4655] hover:bg-[#ff4655]/90 text-white font-black text-[11px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 rounded-sm pointer-events-auto">
                     <i className="fa-solid fa-paper-plane"></i> INITIATE COMMS
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="w-full max-w-[340px] bg-[#111214] rounded-xl p-6 shadow-2xl mx-auto text-center border border-zinc-800">
               <img src={perfil.avatarUrl} className="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800" />
               <h2 className="text-xl font-bold text-white">{perfil.gamerTag}</h2>
               <p className="text-sm text-zinc-400 mb-6">{perfil.game}</p>
               <button onClick={onSendMessage} className="w-full py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg font-bold transition-colors pointer-events-auto">
                 Connect
               </button>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
