                setRangosValorant(mapaDeRangos);

              .then(data => setVersionLol(data[0])).catch(err => console.error(err));
          }, []);

          const handleOpenChat = (perfil) => {
              setChatActivo(perfil);
              setVistaActual('chat');
          };

          const handleEnviarMensaje = (perfilId, texto) => {
              setHistorialChats(prev => ({
                  ...prev,
                  [perfilId]: [...(prev[perfilId] || []), { text: texto, isMine: true }]
              }));
          };

          return (
            <div className="h-screen w-screen overflow-hidden bg-[#1e1f22] text-slate-200 font-sans flex justify-center selection:bg-indigo-500/30">
              <div className="w-full max-w-5xl bg-[#2b2d31] h-full flex flex-col relative shadow-2xl overflow-hidden border-x border-[#1e1f22]">
                
                <header className="h-12 border-b border-zinc-800 flex items-center justify-between px-4 shrink-0 bg-[#2b2d31] z-20">
                  <div className="flex items-center gap-8">
                      <div className="flex items-center gap-2">
                        <i className="fa-solid fa-gamepad text-indigo-400 text-lg"></i>
                        <h1 className="font-bold text-white tracking-wide text-base">RankMate</h1>
                      </div>
                      <nav className="hidden sm:flex gap-6">
                        <button onClick={() => setVistaActual('discover')} className={`text-xs font-bold transition-colors ${vistaActual === 'discover' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>Descubrir</button>
                        <button onClick={() => setVistaActual('chat')} className={`text-xs font-bold transition-colors ${vistaActual === 'chat' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>Chats</button>
                        <button onClick={() => setVistaActual('editor')} className={`text-xs font-bold transition-colors ${vistaActual === 'editor' ? 'text-indigo-400' : 'text-zinc-400 hover:text-white'}`}>Mi Perfil</button>
                      </nav>
                  </div>
                </header>

                <main className="flex-1 overflow-hidden p-2 sm:p-4 relative flex flex-col justify-center items-center">
                  {vistaActual === 'editor' && (
                      <EditorMultiplesPerfiles cuenta={cuenta} setCuenta={setCuenta} iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} />
                  )}
                  {vistaActual === 'discover' && (
                      <DescubrirPerfiles perfiles={MOCK_PROFILES} iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} onSendMessage={handleOpenChat} />
                  )}
                  {vistaActual === 'chat' && chatActivo && (
                      <VistaChat perfil={chatActivo} mensajes={historialChats[chatActivo.id] || []} onEnviar={handleEnviarMensaje} onVolver={() => setVistaActual('discover')} />
                  )}
                  {vistaActual === 'chat' && !chatActivo && (
                      <div className="flex flex-col items-center justify-center h-full text-zinc-500 gap-4">
                          <i className="fa-solid fa-messages text-3xl"></i>
                          <p className="text-sm">Selecciona un perfil en Descubrir para comenzar a chatear.</p>
                      </div>
                  )}
                </main>

                <div className="sm:hidden flex border-t border-zinc-800 bg-[#2b2d31] p-2 justify-around z-20 shrink-0">
                    <button onClick={() => setVistaActual('discover')} className={`flex flex-col items-center ${vistaActual === 'discover' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-compass mb-1 text-sm"></i><span className="text-[9px] font-bold">Descubrir</span></button>
                    <button onClick={() => setVistaActual('chat')} className={`flex flex-col items-center ${vistaActual === 'chat' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-message mb-1 text-sm"></i><span className="text-[9px] font-bold">Chats</span></button>
                    <button onClick={() => setVistaActual('editor')} className={`flex flex-col items-center ${vistaActual === 'editor' ? 'text-indigo-400' : 'text-zinc-400'}`}><i className="fa-solid fa-user mb-1 text-sm"></i><span className="text-[9px] font-bold">Perfil</span></button>
                </div>

              </div>
            </div>
          );
        }

        function DescubrirPerfiles({ perfiles, iconosValorant, rangosValorant, versionLol, onSendMessage }) {
            const [indice, setIndice] = useState(0);

            if (indice >= perfiles.length) return <div className="text-center text-zinc-500 text-sm">¡No hay más perfiles por descubrir!</div>;

            const perfilActual = perfiles[indice];
            const perfilSiguiente = perfiles[indice + 1];

            const handleNext = () => {
                if (indice < perfiles.length - 1) setIndice(indice + 1);
            };

            return (
                <div className="relative flex gap-4 sm:gap-12 w-full justify-center items-center h-full overflow-hidden">
                    <div className="relative z-10 w-[280px] shrink-0">
                        <RenderizadoDePerfil 
                            perfil={perfilActual} 
                            usuarioBase={perfilActual.gamerTag.split('#')[0]} 
                            estado="online" 
                            iconosValorant={iconosValorant} 
                            rangosValorant={rangosValorant} 
                            versionLol={versionLol} 
                            onSendMessage={() => onSendMessage(perfilActual)} 
                        />
                    </div>

                    {perfilSiguiente && (
                        <div className="hidden sm:block relative w-[280px] shrink-0 transition-all duration-300 scale-[0.85] opacity-60 translate-x-4">
                             <div className="pointer-events-none">
                                <RenderizadoDePerfil 
                                    perfil={perfilSiguiente} 
                                    usuarioBase={perfilSiguiente.gamerTag.split('#')[0]} 
                                    estado="idle" 
                                    iconosValorant={iconosValorant} 
                                    rangosValorant={rangosValorant} 
                                    versionLol={versionLol} 
                                />
                             </div>
                             <button 
                                onClick={(e) => { e.stopPropagation(); handleNext(); }} 
                                className="absolute inset-0 m-auto w-16 h-16 bg-zinc-900/90 rounded-full flex items-center justify-center text-white text-2xl hover:bg-zinc-800 hover:scale-110 transition-all z-50 shadow-2xl border border-zinc-700 pointer-events-auto">
                                 <i className="fa-solid fa-chevron-right ml-1"></i>
                             </button>
                        </div>
                    )}
                    
                    {/* Strong right-to-left gradient to mask the next profile */}
                    <div className="absolute right-0 top-0 w-32 sm:w-[300px] h-full bg-gradient-to-l from-[#2b2d31] via-[#2b2d31]/95 to-transparent z-40 pointer-events-none"></div>
                </div>
            );
        }

        function VistaChat({ perfil, mensajes, onEnviar, onVolver }) {
            const [texto, setTexto] = useState("");
            const mensajesEndRef = React.useRef(null);

            useEffect(() => {
                mensajesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [mensajes]);

            const handleSend = () => {
                if(!texto.trim()) return;
                onEnviar(perfil.id, texto);
                setTexto("");
            };

            return (
                <div className="flex flex-col h-full w-full max-w-2xl mx-auto bg-[#1e1f22] rounded-xl border border-zinc-800 overflow-hidden shadow-2xl">
                    <div className="px-4 py-3 border-b border-zinc-800 bg-[#2b2d31] flex items-center gap-3 shrink-0">
                        <button onClick={onVolver} className="text-zinc-400 hover:text-white mr-1 transition-colors">
                           <i className="fa-solid fa-arrow-left text-sm"></i>
                        </button>
                        <div className="relative">
                            <img src={perfil.avatarUrl} className="w-8 h-8 rounded-full object-cover border-2 border-zinc-700" />
                            <div className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-[#2b2d31]"></div>
                        </div>
                        <h3 className="text-white font-bold text-sm">{perfil.gamerTag}</h3>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                        {mensajes.length === 0 ? (
                            <div className="text-center text-zinc-500 mt-6 text-xs">
                                Aún no hay mensajes. ¡Di hola a {perfil.gamerTag.split('#')[0]}!
                            </div>
                        ) : (
                            mensajes.map((msg, i) => (
                                <div key={i} className={`flex ${msg.isMine ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`px-3 py-2 rounded-xl max-w-[75%] text-xs shadow-sm ${msg.isMine ? 'bg-indigo-500 text-white rounded-br-none' : 'bg-[#2b2d31] text-zinc-200 rounded-bl-none border border-zinc-700/50'}`}>
                                        {msg.text}
                                    </div>
                                </div>
                            ))
                        )}
                        <div ref={mensajesEndRef} />
                    </div>

                    <div className="p-3 bg-[#2b2d31] border-t border-zinc-800 shrink-0">
                        <div className="flex items-center gap-2 bg-[#1e1f22] rounded px-3 py-2 border border-zinc-700 focus-within:border-indigo-500 transition-colors">
                            <input
                                type="text"
                                value={texto}
                                onChange={(e) => setTexto(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="Escribir mensaje..."
                                className="flex-1 bg-transparent outline-none text-zinc-200 text-xs placeholder:text-zinc-500 font-medium"
                            />
                            <button onClick={handleSend} className="text-zinc-400 hover:text-white w-6 h-6 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700 transition-colors shrink-0">
                                <i className="fa-solid fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            )
        }

        function EditorMultiplesPerfiles({ cuenta, setCuenta, iconosValorant, rangosValorant, versionLol }) {
           const [idPerfilActivo, setIdPerfilActivo] = useState(cuenta.perfiles[0]?.id || null);

          const manejarAgregarPerfil = () => {
            const nuevoId = `prof_${Date.now()}`;
            const nuevoPerfil = {
              id: nuevoId, game: "League of Legends", gamerTag: "NewPlayer#123",
              avatarUrl: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&q=80",
              bannerUrl: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&q=80",
              frame: "None", rank: "Iron", region: "NA", primaryRole: "Fill", mainChamps: "", aboutMe: "Listo para jugar.", badges: []
            };
            setCuenta({ ...cuenta, perfiles: [...cuenta.perfiles, nuevoPerfil] });
            setIdPerfilActivo(nuevoId);
          };

          const perfilActivo = cuenta.perfiles.find(p => p.id === idPerfilActivo);

          const actualizarPerfilActivo = (cambios) => {
            setCuenta({ ...cuenta, perfiles: cuenta.perfiles.map(p => p.id === idPerfilActivo ? { ...p, ...cambios } : p) });
          };

          const manejarEliminarPerfil = () => {
            if (cuenta.perfiles.length <= 1) return;
            const perfilesNuevos = cuenta.perfiles.filter(p => p.id !== idPerfilActivo);
            setCuenta({ ...cuenta, perfiles: perfilesNuevos });
            setIdPerfilActivo(perfilesNuevos[0].id);
          };

          const manejarSubidaImagen = (e, campo) => {
            const archivo = e.target.files[0];
            if (archivo) {
              const lector = new FileReader();
              lector.onloadend = () => { actualizarPerfilActivo({ [campo]: lector.result }); };
              lector.readAsDataURL(archivo);
            }
          };

          return (
            <div className="flex flex-col h-full w-full max-w-4xl mx-auto space-y-2">
              <div className="flex gap-2 overflow-x-auto hide-scrollbar shrink-0 pb-1">
                {cuenta.perfiles.map(p => (
                  <button key={p.id} onClick={() => setIdPerfilActivo(p.id)} className={`px-2.5 py-1 rounded-md text-[11px] font-medium whitespace-nowrap transition-colors flex items-center gap-1.5 ${idPerfilActivo === p.id ? 'bg-indigo-500 text-white' : 'bg-[#1e1f22] text-zinc-400 hover:text-zinc-200'}`}>
                    <div className="w-3.5 h-3.5 rounded-full overflow-hidden bg-[#2b2d31] flex-shrink-0"><img src={GAMES_DATA[p.game].logo} className="w-full h-full object-cover" /></div>
                    {p.game}
                  </button>
                ))}
                <button onClick={manejarAgregarPerfil} className="px-2.5 py-1 rounded-md text-[11px] font-medium bg-[#1e1f22] text-green-400 hover:bg-green-500/10 transition-colors flex items-center gap-1">
                  <i className="fa-solid fa-plus"></i> Añadir Juego
                </button>
              </div>

              {perfilActivo ? (
                <div className="flex flex-col md:flex-row gap-4 items-center justify-center flex-1 overflow-hidden">
                  <div className="w-[280px] shrink-0 pointer-events-none flex items-center justify-center h-full">
                    <RenderizadoDePerfil perfil={perfilActivo} usuarioBase={cuenta.nombreUsuarioBase} estado="online" iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} onSendMessage={() => {}} />
                  </div>

                  <div className="flex-1 w-full bg-[#1e1f22] rounded-xl p-4 shadow-lg flex flex-col gap-3 overflow-y-auto hide-scrollbar max-h-full">
                    <div className="flex items-center justify-between border-b border-zinc-800 pb-2 shrink-0">
                      <div className="flex items-center gap-2">
                        <i className="fa-solid fa-gear text-zinc-400 text-xs"></i><h3 className="text-xs font-bold text-zinc-200 uppercase">Editar Perfil</h3>
                      </div>
                      {cuenta.perfiles.length > 1 && (<button onClick={manejarEliminarPerfil} className="text-red-400 hover:text-red-300 p-0.5"><i className="fa-solid fa-trash text-xs"></i></button>)}
                    </div>

                    <div className="grid grid-cols-2 gap-2 shrink-0">
                      <div>
                        <label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Juego</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.game} onChange={(e) => { const nj = e.target.value; const dj = GAMES_DATA[nj]; actualizarPerfilActivo({ game: nj, rank: dj.ranks[0].name, region: dj.regions[0], primaryRole: dj.roles[0], mainChamps: "" }); }}>
                          {Object.keys(GAMES_DATA).map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Etiqueta / Tag</label>
                        <input type="text" className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.gamerTag} onChange={(e) => actualizarPerfilActivo({ gamerTag: e.target.value })} placeholder="Ej. Faker#KR1" />
                      </div>
                    </div>

                    <div className="shrink-0 space-y-1.5">
                      <label className="text-[10px] font-bold text-zinc-400 uppercase block">Apariencia</label>
                      <div className="grid grid-cols-3 gap-2">
                        <div><label className="block text-[9px] text-zinc-500 uppercase font-bold mb-0.5">Imagen Avatar</label><input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded p-1 outline-none text-[10px] file:hidden cursor-pointer" onChange={(e) => manejarSubidaImagen(e, 'avatarUrl')} /></div>
                        <div><label className="block text-[9px] text-zinc-500 uppercase font-bold mb-0.5">Imagen Banner</label><input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded p-1 outline-none text-[10px] file:hidden cursor-pointer" onChange={(e) => manejarSubidaImagen(e, 'bannerUrl')} /></div>
                        <div><label className="block text-[9px] text-zinc-500 uppercase font-bold mb-0.5">Marco Avatar</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.frame} onChange={(e) => actualizarPerfilActivo({ frame: e.target.value })}>{Object.keys(AVATAR_FRAMES).map(f => <option key={f} value={f}>{f}</option>)}</select></div>
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-2 shrink-0">
                      <div><label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Rango</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.rank} onChange={(e) => actualizarPerfilActivo({ rank: e.target.value })}>{GAMES_DATA[perfilActivo.game].ranks.map(r => <option key={r.name} value={r.name}>{r.name}</option>)}</select></div>
                      <div><label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Región</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.region} onChange={(e) => actualizarPerfilActivo({ region: e.target.value })}>{GAMES_DATA[perfilActivo.game].regions.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                      <div><label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Rol Principal</label><select className="w-full bg-[#2b2d31] text-zinc-200 rounded p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-[11px]" value={perfilActivo.primaryRole} onChange={(e) => actualizarPerfilActivo({ primaryRole: e.target.value })}>{GAMES_DATA[perfilActivo.game].roles.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                    </div>

                    {GAMES_DATA[perfilActivo.game].characters && (
                      <div className="shrink-0 flex flex-col md:flex-row md:items-center gap-2">
                        <label className="text-[10px] font-bold text-zinc-400 uppercase md:w-32">Campeones (Máx 4)</label>
                        <div className="flex flex-wrap gap-1 flex-1 items-center">
                          {perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean).map(champ => (
                            <div key={champ} className="bg-[#1e1f22] border border-zinc-700 rounded px-1.5 py-0.5 text-[10px] text-zinc-300 flex items-center gap-1 shadow-sm">
                              {champ} <button onClick={() => { const nac = perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean).filter(c => c !== champ).join(','); actualizarPerfilActivo({ mainChamps: nac }); }} className="text-zinc-500 hover:text-red-400"><i className="fa-solid fa-xmark"></i></button>
                            </div>
                          )) : null}
                          <select className="bg-[#2b2d31] text-zinc-200 rounded p-1 outline-none focus:ring-1 focus:ring-indigo-500 text-[10px] cursor-pointer" value="" onChange={(e) => { const v = e.target.value; if (!v) return; const cur = perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean) : []; if (cur.length >= 4 || cur.includes(v)) return; actualizarPerfilActivo({ mainChamps: [...cur, v].join(',') }); }}>
                            <option value="">+ Añadir...</option>
                            {GAMES_DATA[perfilActivo.game].characters.filter(c => !(perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(n => n.trim()).filter(Boolean) : []).includes(c)).map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </div>
                      </div>
                    )}
                    <div className="shrink-0 flex-1 flex flex-col">
                      <label className="text-[10px] font-bold text-zinc-400 uppercase mb-1 block">Biografía</label>
                      <textarea className="w-full bg-[#2b2d31] text-zinc-200 rounded p-2 outline-none focus:ring-1 focus:ring-indigo-500 resize-none h-12 text-[11px] flex-1 min-h-[40px]" value={perfilActivo.aboutMe} onChange={(e) => actualizarPerfilActivo({ aboutMe: e.target.value })} />
                    </div>
                  </div>
                </div>
              ) : (<div className="text-center text-zinc-500 py-10 text-xs">Ningún perfil seleccionado.</div>)}
            </div>
          );
        }

        function RenderizadoDePerfil({ perfil, usuarioBase, estado, iconosValorant, rangosValorant, versionLol, onSendMessage }) {
          const datosJuego = GAMES_DATA[perfil.game];
          const objetoRango = datosJuego.ranks.find(r => r.name === perfil.rank) || datosJuego.ranks[0];
          const cssMarco = AVATAR_FRAMES[perfil.frame] || "";
          let imagenRangoActual = objetoRango.img;
          if (perfil.game === "Valorant" && rangosValorant && rangosValorant[perfil.rank]) imagenRangoActual = rangosValorant[perfil.rank];
          
          const obtenerColorEstado = (s) => {
            switch(s) { case 'online': return 'bg-green-500'; case 'dnd': return 'bg-red-500'; case 'idle': return 'bg-yellow-500'; default: return 'bg-zinc-500'; }
          };

          if (perfil.game === "League of Legends") {
            return (
              <div className="w-full max-w-[280px] h-[540px] bg-[#010a13] rounded-[3px] shadow-2xl overflow-hidden text-zinc-300 text-xs border border-[#c8aa6e]/30 mx-auto relative group flex flex-col">
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 mix-blend-luminosity shrink-0" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#010a13] shrink-0" />
                <div className="relative px-3 pt-10 pb-5 flex flex-col items-center z-10 flex-1">
                  <div className={`w-[84px] h-[84px] rounded-full border-[1.5px] border-[#c8aa6e] bg-[#010a13] p-0.5 relative ${cssMarco} shadow-xl`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-full" />
                    <div className={`absolute bottom-0.5 right-0.5 w-4 h-4 rounded-full border-[1.5px] border-[#010a13] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-2xl font-bold text-[#f0e6d2] mt-4 tracking-wide truncate w-full text-center">{perfil.gamerTag}</h2>
                  <p className="text-[11px] text-[#c8aa6e]">alias {usuarioBase}</p>
                  <div className="mt-4 flex items-center gap-1.5 border border-[#c8aa6e]/50 bg-[#010a13]/80 px-3 py-1 rounded-full">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-4 h-4" />
                     <span className="text-[10px] font-bold text-[#c8aa6e] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-28 h-28 drop-shadow-[0_0_15px_rgba(200,170,110,0.3)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[3.5]" /></div>
                     <div className="font-black text-transparent bg-clip-text bg-gradient-to-b from-[#f0e6d2] to-[#c8aa6e] text-lg uppercase tracking-[0.1em] mt-3 drop-shadow-md">{objetoRango.name}</div>
                     <div className="text-[10px] text-[#a09b8c] tracking-widest mt-1 uppercase">{perfil.region} Servidor</div>
                  </div>
                  <div className="mt-6 w-full text-center px-2">
                    <p className="text-[11px] italic text-[#a09b8c] leading-relaxed relative inline-block">
                       <span className="text-xl text-[#c8aa6e]/30 absolute -top-2.5 -left-3">"</span>{perfil.aboutMe}<span className="text-xl text-[#c8aa6e]/30 absolute -bottom-3 -right-3">"</span>
                    </p>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-auto mb-2 py-3 rounded border border-[#c8aa6e] bg-[#c8aa6e]/10 hover:bg-[#c8aa6e]/20 text-[#f0e6d2] font-bold text-[11px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 pointer-events-auto">
                     <i className="fa-solid fa-message"></i> Enviar Mensaje
                  </button>
                </div>
              </div>
            );
          }

          if (perfil.game === "Counter-Strike 2") {
            return (
              <div className="w-full max-w-[280px] h-[540px] bg-[#161719] rounded-sm shadow-[0_0_20px_rgba(0,0,0,0.9)] overflow-hidden text-zinc-300 text-xs border-[2px] border-[#2a2c31] mx-auto relative group font-mono flex flex-col">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-orange-500 z-20 shrink-0" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 grayscale sepia-[.2] shrink-0" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#161719] shrink-0" />
                <div className="relative px-3 pt-10 pb-5 flex flex-col items-center z-10 flex-1">
                  <div className={`w-[84px] h-[84px] rounded border-[1.5px] border-orange-500 bg-[#161719] p-0.5 relative shadow-[0_0_10px_rgba(249,115,22,0.15)] ${cssMarco}`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-sm grayscale-[0.2]" />
                    <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-sm border-[1.5px] border-[#161719] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-2xl font-black text-white mt-4 tracking-tight uppercase flex items-center gap-2 truncate w-full justify-center">
                     <i className="fa-brands fa-steam text-zinc-500 text-lg"></i>{perfil.gamerTag}
                  </h2>
                  <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">ID: {usuarioBase}</p>
                  <div className="mt-5 flex items-center gap-1.5 border border-orange-500/30 bg-orange-500/10 px-3 py-1.5 rounded-sm shadow-inner">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} csSize="text-base" />
                     <span className="text-[11px] font-bold text-orange-500 uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-8 flex flex-col items-center">
                     <div className="w-32 h-20 flex items-center justify-center drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.3]" /></div>
                     <div className="font-black text-zinc-200 text-lg uppercase tracking-widest mt-4 drop-shadow-md">{objetoRango.name}</div>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-auto py-3.5 bg-zinc-800 hover:bg-orange-600 text-zinc-300 hover:text-white border border-zinc-700 hover:border-orange-500 font-black text-[10px] uppercase tracking-widest transition-all duration-200 flex items-center justify-center gap-2 rounded-sm shadow-lg pointer-events-auto">
                     <i className="fa-solid fa-microphone-lines"></i> CONECTAR A SALA
                  </button>
                </div>
              </div>
            );
          }

          if (perfil.game === "Valorant") {
            return (
              <div className="w-full max-w-[280px] h-[540px] bg-[#0f1923] rounded-none shadow-[0_0_20px_rgba(255,70,85,0.15)] overflow-hidden text-[#ece8e1] text-xs border border-[#ff4655]/30 mx-auto relative group font-sans flex flex-col">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-[#ff4655] z-20 shrink-0" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-30 mix-blend-luminosity grayscale shrink-0" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#0f1923] shrink-0" />
                <div className="relative px-3 pt-10 pb-5 flex flex-col items-center z-10 flex-1">
                  <div className={`w-[84px] h-[84px] rounded-tl-md rounded-tr-md rounded-bl-md rounded-br-[24px] border-[1.5px] border-[#ff4655] bg-[#0f1923] p-0.5 relative ${cssMarco} shadow-[0_0_10px_rgba(255,70,85,0.2)]`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-tl-[4px] rounded-tr-[4px] rounded-bl-[4px] rounded-br-[20px]" />
                    <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-[1.5px] border-[#0f1923] ${obtenerColorEstado(estado)}`} />
                  </div>
                  <h2 className="text-2xl font-black text-[#ece8e1] mt-4 tracking-widest uppercase flex items-center gap-1 truncate w-full justify-center">
                     {perfil.gamerTag.split('#')[0]}<span className="text-[#ff4655] text-[11px]">#{perfil.gamerTag.split('#')[1]}</span>
                  </h2>
                  <div className="mt-5 flex items-center gap-1.5 border border-[#ff4655]/50 bg-[#ff4655]/10 px-3 py-1 rounded-sm">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-4 h-4" />
                     <span className="text-[11px] font-black text-[#ece8e1] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>
                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-28 h-28 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]"><img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.1]" /></div>
                     <div className="font-black text-white text-xl uppercase tracking-[0.1em] mt-3 drop-shadow-md">{objetoRango.name}</div>
                  </div>
                  <button onClick={onSendMessage} className="w-full mt-auto py-3.5 bg-[#ff4655] hover:bg-[#ff4655]/90 text-white font-black text-[10px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 rounded-sm pointer-events-auto">
                     <i className="fa-solid fa-paper-plane"></i> INICIAR COMUNICACIÓN
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="w-full max-w-[280px] h-[540px] bg-[#111214] rounded-lg p-5 shadow-2xl mx-auto text-center border border-zinc-800 flex flex-col items-center justify-center">
               <img src={perfil.avatarUrl} className="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-2 border-zinc-800" />
               <h2 className="text-xl font-bold text-white">{perfil.gamerTag}</h2>
               <p className="text-sm text-zinc-400 mb-6">{perfil.game}</p>
               <button onClick={onSendMessage} className="w-full py-3 bg-indigo-500 hover:bg-indigo-600 text-white text-sm rounded font-bold transition-colors pointer-events-auto mt-auto">
                 Conectar
               </button>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
