                  <path fill="rgb(201,170,110)" stroke="rgb(201,170,110)" strokeWidth="1" opacity="0.98" d="M 81.5 32 L 119 32.5 L 101.5 44 Q 94.9 46.9 85 46.5 L 95 59.5 L 78.5 67 L 76 62.5 L 71 42.5 L 81.5 32 Z " />
                  <path fill="rgb(201,170,110)" stroke="rgb(201,170,110)" strokeWidth="1" opacity="0.98" d="M 56 47 L 60.5 49 L 64 47 L 74 98.5 L 59.5 109 L 46 98.5 L 56 47 Z " />
                </svg>
              );
              case "Fill": return (
                <svg className={svgClasses} viewBox="0 0 136 136">
                  <path fill="rgb(199,169,109)" stroke="rgb(199,169,109)" strokeWidth="1" opacity="0.95" d="M 39 20 L 51.5 23 L 54 25.5 L 67 49 Q 69.7 50.1 69 47.5 L 84.5 23 L 97 20 L 100 29.5 L 100 33.5 L 84 59.5 L 116.5 60 L 124 67.5 L 116.5 76 L 84 76.5 L 99 100.5 L 100 106.5 L 97 116 L 84.5 113 L 82 110.5 L 69 87 Q 66.3 85.9 67 88.5 L 51.5 113 L 39 116 L 36 106.5 L 36 102.5 L 52 76.5 L 19.5 76 L 12 68.5 L 19.5 60 L 52 59.5 L 37 35.5 L 36 29.5 L 39 20 Z " />
                </svg>
              );
            }
          }

          if (game === "Counter-Strike 2") {
            const csClass = `${csSize} text-orange-400 drop-shadow-md`;
            switch(role) {
              case "Entry Fragger": return <i className={`fa-solid fa-door-open ${csClass}`}></i>;
              case "AWPer": return <i className={`fa-solid fa-crosshairs ${csClass}`}></i>;
              case "Support": return <i className={`fa-solid fa-handshake ${csClass}`}></i>;
              case "IGL": return <i className={`fa-solid fa-brain ${csClass}`}></i>;
              case "Lurker": return <i className={`fa-solid fa-user-ninja ${csClass}`}></i>;
            }
          }

          return <div className={`${svgSize} rounded-full ${fallbackClass} drop-shadow-md`} />;
        };

        const obtenerImagenCampeon = (game, name, iconosValorant = {}, versionLol = "14.8.1") => {
          const nombreLimpio = name.replace(/[^a-zA-Z]/g, ''); 
          if (game === "Valorant") {
            return iconosValorant[nombreLimpio.toLowerCase()] || `https://ui-avatars.com/api/?name=${name}&background=2b2d31&color=fff&size=64`;
          }
          if (game === "League of Legends") {
            let ddragonName = nombreLimpio;
            if (nombreLimpio.toLowerCase() === 'wukong') ddragonName = 'MonkeyKing';
            return `https://ddragon.leagueoflegends.com/cdn/${versionLol}/img/champion/${ddragonName}.png`;
          }
          return `https://ui-avatars.com/api/?name=${name}&background=2b2d31&color=fff&size=64`;
        };

        // --- Componente Principal ---
        function App() {
          const [iconosValorant, setIconosValorant] = useState({});
          const [rangosValorant, setRangosValorant] = useState({});
          const [versionLol, setVersionLol] = useState("14.8.1");
          
          const [cuenta, setCuenta] = useState({
            nombreUsuarioBase: "NewUser123",
            perfiles: [
              {
                id: "prof_1",
                game: "League of Legends",
                gamerTag: "PlayerOne#123",
                avatarUrl: "https://images.unsplash.com/photo-1622547748225-3fc4abd2cca0?w=400&q=80",
                bannerUrl: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&q=80",
                frame: "Neon Cyber",
                rank: "Iron",
                region: "NA",
                primaryRole: "Mid",
                mainChamps: "Ahri,Yasuo",
                aboutMe: "Ready to grind.",
                badges: []
              }
            ]
          });

          useEffect(() => {
            fetch('https://valorant-api.com/v1/agents?isPlayableCharacter=true')
              .then(res => res.json())
              .then(data => {
                const mapaDeIconos = {};
                data.data.forEach(agent => {
                  const nombreLimpio = agent.displayName.replace(/[^a-zA-Z]/g, '').toLowerCase();
                  mapaDeIconos[nombreLimpio] = agent.displayIcon;
                });
                setIconosValorant(mapaDeIconos);
              })
              .catch(err => console.error("Error cargando agentes", err));

            fetch('https://valorant-api.com/v1/competitivetiers')
              .then(res => res.json())
              .then(data => {
                const episodioActual = data.data[data.data.length - 1];
                const mapaDeRangos = {};
                episodioActual.tiers.forEach(t => {
                  if (t.tierName === 'RADIANT' || t.tierName.includes('3')) {
                    const nombreBase = t.tierName.split(' ')[0]; 
                    const nombreFormateado = nombreBase.charAt(0) + nombreBase.toLowerCase().slice(1);
                    mapaDeRangos[nombreFormateado] = t.largeIcon;
                  }
                });
                setRangosValorant(mapaDeRangos);
              })
              .catch(err => console.error("Error cargando rangos", err));

            fetch('https://ddragon.leagueoflegends.com/api/versions.json')
              .then(res => res.json())
              .then(data => setVersionLol(data[0]))
              .catch(err => console.error("Error cargando versión de LoL", err));
          }, []);

          return (
            <div className="min-h-screen bg-[#1e1f22] text-slate-200 font-sans flex justify-center selection:bg-indigo-500/30">
              <div className="w-full max-w-5xl bg-[#2b2d31] min-h-screen flex flex-col relative shadow-2xl overflow-hidden border-x border-[#1e1f22]">
                
                {/* Header */}
                <header className="h-14 border-b border-[#1e1f22] flex items-center justify-between px-4 shrink-0 bg-[#2b2d31] z-20">
                  <div className="flex items-center gap-2">
                    <i className="fa-solid fa-gamepad text-indigo-400 text-xl"></i>
                    <h1 className="font-bold text-white tracking-wide text-lg">RankMate</h1>
                  </div>
                </header>

                {/* Contenido Principal */}
                <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 relative hide-scrollbar">
                  <EditorMultiplesPerfiles cuenta={cuenta} setCuenta={setCuenta} iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} />
                </main>

              </div>
            </div>
          );
        }

        // --- Componentes Secundarios ---

        function EditorMultiplesPerfiles({ cuenta, setCuenta, iconosValorant, rangosValorant, versionLol }) {
          const [idPerfilActivo, setIdPerfilActivo] = useState(cuenta.perfiles[0]?.id || null);

          const manejarAgregarPerfil = () => {
            const nuevoId = `prof_${Date.now()}`;
            const nuevoPerfil = {
              id: nuevoId, game: "League of Legends", gamerTag: "NewPlayer#123",
              avatarUrl: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&q=80",
              bannerUrl: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&q=80",
              frame: "None", rank: "Iron", region: "NA", primaryRole: "Fill", mainChamps: "", aboutMe: "Ready to play.", badges: []
            };
            setCuenta({ ...cuenta, perfiles: [...cuenta.perfiles, nuevoPerfil] });
            setIdPerfilActivo(nuevoId);
          };

          const perfilActivo = cuenta.perfiles.find(p => p.id === idPerfilActivo);

          const actualizarPerfilActivo = (cambios) => {
            setCuenta({
              ...cuenta,
              perfiles: cuenta.perfiles.map(p => p.id === idPerfilActivo ? { ...p, ...cambios } : p)
            });
          };

          const manejarEliminarPerfil = () => {
            if (cuenta.perfiles.length <= 1) return;
            const perfilesNuevos = cuenta.perfiles.filter(p => p.id !== idPerfilActivo);
            setCuenta({ ...cuenta, perfiles: perfilesNuevos });
            setIdPerfilActivo(perfilesNuevos[0].id);
          };

          const manejarSubidaImagen = (e, campo) => {
            const archivo = e.target.files[0];
            if (archivo) {
              const lector = new FileReader();
              lector.onloadend = () => {
                actualizarPerfilActivo({ [campo]: lector.result });
              };
              lector.readAsDataURL(archivo);
            }
          };

          return (
            <div className="space-y-6">
              
              <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                {cuenta.perfiles.map(p => (
                  <button
                    key={p.id}
                    onClick={() => setIdPerfilActivo(p.id)}
                    className={`px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${
                      idPerfilActivo === p.id ? 'bg-indigo-500 text-white' : 'bg-[#1e1f22] text-zinc-400 hover:text-zinc-200'
                    }`}
                  >
                    <div className="w-4 h-4 rounded-full overflow-hidden bg-[#2b2d31] flex-shrink-0">
                       <img src={GAMES_DATA[p.game].logo} className="w-full h-full object-cover" alt="" />
                    </div>
                    {p.game}
                  </button>
                ))}
                <button onClick={manejarAgregarPerfil} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-[#1e1f22] text-green-400 hover:bg-green-500/10 transition-colors flex items-center gap-1">
                  <i className="fa-solid fa-plus"></i> Add Game
                </button>
              </div>

              {perfilActivo ? (
                <div className="flex flex-col md:flex-row gap-6 items-start">
                  <div className="w-full md:w-[340px] shrink-0 pointer-events-none md:sticky md:top-4 mx-auto md:mx-0">
                    <RenderizadoDePerfil perfil={perfilActivo} usuarioBase={cuenta.nombreUsuarioBase} estado="online" iconosValorant={iconosValorant} rangosValorant={rangosValorant} versionLol={versionLol} />
                  </div>

                  <div className="flex-1 w-full bg-[#1e1f22] rounded-xl p-5 space-y-5 shadow-lg">
                    <div className="flex items-center justify-between mb-2 border-b border-zinc-800 pb-2">
                      <div className="flex items-center gap-2">
                        <i className="fa-solid fa-gear text-zinc-400"></i>
                        <h3 className="text-sm font-bold text-zinc-200 uppercase">Edit Profile</h3>
                      </div>
                      {cuenta.perfiles.length > 1 && (
                        <button onClick={manejarEliminarPerfil} className="text-red-400 hover:text-red-300 p-1">
                          <i className="fa-solid fa-trash"></i>
                        </button>
                      )}
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Game</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                          value={perfilActivo.game} onChange={(e) => {
                            const nuevoJuego = e.target.value;
                            const datosJuego = GAMES_DATA[nuevoJuego];
                            actualizarPerfilActivo({ game: nuevoJuego, rank: datosJuego.ranks[0].name, region: datosJuego.regions[0], primaryRole: datosJuego.roles[0], mainChamps: "" });
                          }}>
                          {Object.keys(GAMES_DATA).map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">In-Game Tag</label>
                        <input type="text" className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                          value={perfilActivo.gamerTag} onChange={(e) => actualizarPerfilActivo({ gamerTag: e.target.value })} placeholder="e.g. Faker#KR1" />
                      </div>
                    </div>

                    <div className="space-y-3">
                      <label className="text-xs font-bold text-zinc-400 uppercase block">Visuals</label>
                      <div className="grid grid-cols-1 gap-3">
                        <div>
                          <label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Avatar Image</label>
                          <input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded-md p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 cursor-pointer"
                            onChange={(e) => manejarSubidaImagen(e, 'avatarUrl')} />
                        </div>
                        <div>
                          <label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Banner Image</label>
                          <input type="file" accept="image/*" className="w-full bg-[#2b2d31] text-zinc-400 rounded-md p-1.5 outline-none focus:ring-1 focus:ring-indigo-500 text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 cursor-pointer"
                            onChange={(e) => manejarSubidaImagen(e, 'bannerUrl')} />
                        </div>
                        <div>
                          <label className="block text-[10px] text-zinc-500 uppercase font-bold mb-1">Avatar Frame</label>
                          <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                            value={perfilActivo.frame} onChange={(e) => actualizarPerfilActivo({ frame: e.target.value })}>
                            {Object.keys(AVATAR_FRAMES).map(f => <option key={f} value={f}>{f} Frame</option>)}
                          </select>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Rank</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                          value={perfilActivo.rank} onChange={(e) => actualizarPerfilActivo({ rank: e.target.value })}>
                          {GAMES_DATA[perfilActivo.game].ranks.map(r => <option key={r.name} value={r.name}>{r.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Region / Server</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                          value={perfilActivo.region} onChange={(e) => actualizarPerfilActivo({ region: e.target.value })}>
                          {GAMES_DATA[perfilActivo.game].regions.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Primary Role</label>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm"
                          value={perfilActivo.primaryRole} onChange={(e) => actualizarPerfilActivo({ primaryRole: e.target.value })}>
                          {GAMES_DATA[perfilActivo.game].roles.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                      </div>
                    </div>

                    {GAMES_DATA[perfilActivo.game].characters && (
                      <div>
                        <label className="text-xs font-bold text-zinc-400 uppercase mb-2 block">Champs / Agents (Max 4)</label>
                        <div className="flex flex-wrap gap-2 mb-3">
                          {perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean).map(champ => (
                            <div key={champ} className="bg-[#1e1f22] border border-zinc-700 rounded-md px-2 py-1 text-xs text-zinc-300 flex items-center gap-1.5 shadow-sm">
                              {champ}
                              <button onClick={() => {
                                  const campeonesActuales = perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean);
                                  const nuevosCampeones = campeonesActuales.filter(c => c !== champ).join(',');
                                  actualizarPerfilActivo({ mainChamps: nuevosCampeones });
                                }} className="text-zinc-500 hover:text-red-400 transition-colors">
                                <i className="fa-solid fa-xmark"></i>
                              </button>
                            </div>
                          )) : null}
                        </div>
                        <select className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 text-sm cursor-pointer"
                          value="" onChange={(e) => {
                            const valor = e.target.value;
                            if (!valor) return;
                            const campeonesActuales = perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(c => c.trim()).filter(Boolean) : [];
                            if (campeonesActuales.length >= 4 || campeonesActuales.includes(valor)) return;
                            actualizarPerfilActivo({ mainChamps: [...campeonesActuales, valor].join(',') });
                          }}>
                          <option value="">+ Add {perfilActivo.game === "Valorant" ? "Agent" : "Champion"}...</option>
                          {GAMES_DATA[perfilActivo.game].characters
                            .filter(c => !(perfilActivo.mainChamps ? perfilActivo.mainChamps.split(',').map(name => name.trim()).filter(Boolean) : []).includes(c))
                            .map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    )}

                    <div>
                      <label className="text-xs font-bold text-zinc-400 uppercase mb-1 block">Bio for this Game</label>
                      <textarea className="w-full bg-[#2b2d31] text-zinc-200 rounded-md p-2 outline-none focus:ring-1 focus:ring-indigo-500 resize-none h-16 text-sm"
                        value={perfilActivo.aboutMe} onChange={(e) => actualizarPerfilActivo({ aboutMe: e.target.value })} placeholder="Looking for a solid duo..." />
                    </div>
                  </div>
                </div>
              ) : (
                <div className="text-center text-zinc-500 py-10">No game profile selected.</div>
              )}
            </div>
          );
        }

        function RenderizadoDePerfil({ perfil, usuarioBase, estado, iconosValorant, rangosValorant, versionLol }) {
          const datosJuego = GAMES_DATA[perfil.game];
          const objetoRango = datosJuego.ranks.find(r => r.name === perfil.rank) || datosJuego.ranks[0];
          const cssMarco = AVATAR_FRAMES[perfil.frame] || "";
          
          let imagenRangoActual = objetoRango.img;
          if (perfil.game === "Valorant" && rangosValorant && rangosValorant[perfil.rank]) {
            imagenRangoActual = rangosValorant[perfil.rank];
          }
          
          const obtenerColorEstado = (s) => {
            switch(s) {
              case 'online': return 'bg-green-500';
              case 'dnd': return 'bg-red-500';
              case 'idle': return 'bg-yellow-500';
              default: return 'bg-zinc-500';
            }
          };

          // --- LEAGUE OF LEGENDS LAYOUT ---
          if (perfil.game === "League of Legends") {
            return (
              <div className="w-full max-w-[340px] bg-[#010a13] rounded-[4px] shadow-2xl overflow-hidden text-zinc-300 text-sm border-2 border-[#c8aa6e]/30 mx-auto relative group">
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 mix-blend-luminosity" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#010a13]" />
                
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-full border-[2px] border-[#c8aa6e] bg-[#010a13] p-1 relative ${cssMarco} shadow-xl`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-full" />
                    <div className={`absolute bottom-1 right-1 w-5 h-5 rounded-full border-[2px] border-[#010a13] ${obtenerColorEstado(estado)}`} />
                  </div>
                  
                  <h2 className="text-xl font-bold text-[#f0e6d2] mt-3 tracking-wide">{perfil.gamerTag}</h2>
                  <p className="text-xs text-[#c8aa6e]">aka {usuarioBase}</p>

                  <div className="mt-3 flex items-center gap-1.5 border border-[#c8aa6e]/50 bg-[#010a13]/80 px-3 py-1 rounded-full">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-4 h-4" />
                     <span className="text-[10px] font-bold text-[#c8aa6e] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>

                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-32 drop-shadow-[0_0_20px_rgba(200,170,110,0.3)]">
                        <img src={imagenRangoActual} className="w-full h-full object-contain scale-[4]" />
                     </div>
                     <div className="font-black text-transparent bg-clip-text bg-gradient-to-b from-[#f0e6d2] to-[#c8aa6e] text-xl uppercase tracking-[0.2em] mt-2 drop-shadow-md">{objetoRango.name}</div>
                     <div className="text-[10px] text-[#a09b8c] tracking-widest mt-1 uppercase">{perfil.region} Server</div>
                  </div>

                  {perfil.mainChamps && (
                    <div className="mt-6 w-full">
                      <div className="flex justify-center gap-4">
                        {perfil.mainChamps.split(',').map((champ, idx) => {
                           const nombreLimpio = champ.trim();
                           if(!nombreLimpio) return null;
                           return (
                             <div key={idx} className="w-12 h-12 rounded-full border-2 border-[#c8aa6e] overflow-hidden relative shadow-[0_0_10px_rgba(200,170,110,0.2)]" title={nombreLimpio}>
                               <img src={obtenerImagenCampeon(perfil.game, nombreLimpio, iconosValorant, versionLol)} className="w-full h-full object-cover scale-110" />
                             </div>
                           )
                        })}
                      </div>
                    </div>
                  )}

                  <div className="mt-6 w-full text-center px-4">
                    <p className="text-xs italic text-[#a09b8c] leading-relaxed relative inline-block">
                       <span className="text-2xl text-[#c8aa6e]/30 absolute -top-3 -left-4">"</span>
                       {perfil.aboutMe}
                       <span className="text-2xl text-[#c8aa6e]/30 absolute -bottom-4 -right-4">"</span>
                    </p>
                  </div>

                  <button className="w-full mt-6 py-3 rounded border border-[#c8aa6e] bg-[#c8aa6e]/10 hover:bg-[#c8aa6e]/20 text-[#f0e6d2] font-bold text-xs uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                     <i className="fa-solid fa-message"></i> Send Message
                  </button>
                </div>
              </div>
            );
          }

          // --- COUNTER-STRIKE 2 LAYOUT ---
          if (perfil.game === "Counter-Strike 2") {
            return (
              <div className="w-full max-w-[340px] bg-[#161719] rounded-sm shadow-[0_0_25px_rgba(0,0,0,0.9)] overflow-hidden text-zinc-300 text-sm border-[3px] border-[#2a2c31] mx-auto relative group font-mono">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-orange-500 z-20" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-40 grayscale sepia-[.2]" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#161719]" />
                <div className="h-[140px] w-full absolute top-0 left-0 opacity-10 bg-[repeating-linear-gradient(0deg,transparent,transparent_2px,#000_2px,#000_4px)]" />
                
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-md border-[2px] border-orange-500 bg-[#161719] p-1 relative shadow-[0_0_15px_rgba(249,115,22,0.15)] ${cssMarco}`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-sm grayscale-[0.2]" />
                    <div className={`absolute -bottom-2 -right-2 w-5 h-5 rounded-sm border-[2px] border-[#161719] ${obtenerColorEstado(estado)}`} />
                  </div>
                  
                  <h2 className="text-2xl font-black text-white mt-4 tracking-tight uppercase flex items-center gap-2">
                     <i className="fa-brands fa-steam text-zinc-500 text-lg"></i>
                     {perfil.gamerTag}
                  </h2>
                  <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">ID: {usuarioBase}</p>

                  <div className="mt-4 flex items-center gap-2 border border-orange-500/30 bg-orange-500/10 px-4 py-1.5 rounded-sm shadow-inner">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} csSize="text-lg" />
                     <span className="text-xs font-bold text-orange-500 uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>

                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-24 flex items-center justify-center drop-shadow-[0_5px_10px_rgba(0,0,0,0.8)]">
                        <img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.3]" 
                          onError={(e) => {
                            if(e.target.getAttribute('data-error')) return;
                            e.target.setAttribute('data-error', 'true');
                            e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(objetoRango.name)}&background=161719&color=f97316&size=128&font-size=0.33`;
                          }}
                        />
                     </div>
                     <div className="font-black text-zinc-200 text-xl uppercase tracking-widest mt-4 drop-shadow-md">{objetoRango.name}</div>
                     <div className="text-[10px] text-zinc-500 font-bold tracking-widest mt-1 uppercase flex items-center gap-1.5">
                        <i className="fa-solid fa-satellite-dish text-orange-500"></i> REGION: {perfil.region}
                     </div>
                  </div>

                  <div className="mt-8 w-full px-4 bg-[#0a0a0c] p-3 border border-zinc-800 rounded-sm relative shadow-inner">
                    <div className="text-[9px] text-orange-500/80 uppercase tracking-widest font-bold mb-2 flex items-center gap-1.5 border-b border-zinc-800/50 pb-1.5">
                       <i className="fa-solid fa-terminal"></i> root@comms:~# cat intel.txt
                    </div>
                    <p className="text-xs text-zinc-400 leading-relaxed font-sans">
                       <span className="text-green-500 mr-1 font-mono font-bold">$</span>{perfil.aboutMe}
                    </p>
                  </div>

                  <button className="w-full mt-6 py-3.5 bg-zinc-800 hover:bg-orange-600 text-zinc-300 hover:text-white border-2 border-zinc-700 hover:border-orange-500 font-black text-[11px] uppercase tracking-widest transition-all duration-200 flex items-center justify-center gap-2 rounded-sm shadow-lg group">
                     <i className="fa-solid fa-microphone-lines group-hover:animate-pulse"></i> CONNECT TO LOBBY
                  </button>
                </div>
              </div>
            );
          }

          // --- VALORANT LAYOUT ---
          if (perfil.game === "Valorant") {
            return (
              <div className="w-full max-w-[340px] bg-[#0f1923] rounded-none shadow-[0_0_30px_rgba(255,70,85,0.15)] overflow-hidden text-[#ece8e1] text-sm border border-[#ff4655]/30 mx-auto relative group font-sans">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-[#ff4655] z-20" />
                <div className="h-[140px] w-full bg-cover bg-center absolute top-0 left-0 opacity-30 mix-blend-luminosity grayscale" style={{ backgroundImage: `url(${perfil.bannerUrl})` }} />
                <div className="h-[140px] w-full absolute top-0 left-0 bg-gradient-to-b from-transparent to-[#0f1923]" />
                
                <div className="relative px-4 pt-10 pb-6 flex flex-col items-center z-10">
                  <div className={`w-[100px] h-[100px] rounded-tl-lg rounded-tr-lg rounded-bl-lg rounded-br-[32px] border-[2px] border-[#ff4655] bg-[#0f1923] p-1 relative ${cssMarco} shadow-[0_0_15px_rgba(255,70,85,0.2)]`}>
                    <img src={perfil.avatarUrl} className="w-full h-full object-cover rounded-tl-md rounded-tr-md rounded-bl-md rounded-br-[28px]" />
                    <div className={`absolute -bottom-1 -right-1 w-5 h-5 rounded-full border-[2px] border-[#0f1923] ${obtenerColorEstado(estado)}`} />
                  </div>
                  
                  <h2 className="text-2xl font-black text-[#ece8e1] mt-4 tracking-widest uppercase flex items-center gap-1">
                     {perfil.gamerTag.split('#')[0]}
                     <span className="text-[#ff4655] text-sm">#{perfil.gamerTag.split('#')[1]}</span>
                  </h2>
                  <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest mt-0.5">ID: {usuarioBase}</p>

                  <div className="mt-4 flex items-center gap-2 border border-[#ff4655]/50 bg-[#ff4655]/10 px-4 py-1.5 rounded-sm">
                     <IconoDeRol game={perfil.game} role={perfil.primaryRole} fallbackClass={datosJuego.bgAccent} svgSize="w-5 h-5" />
                     <span className="text-xs font-black text-[#ece8e1] uppercase tracking-widest">{perfil.primaryRole}</span>
                  </div>

                  <div className="mt-6 flex flex-col items-center">
                     <div className="w-32 h-32 drop-shadow-[0_0_25px_rgba(255,255,255,0.1)]">
                        <img src={imagenRangoActual} className="w-full h-full object-contain scale-[1.15]" 
                          onError={(e) => {
                            if(e.target.getAttribute('data-error')) return;
                            e.target.setAttribute('data-error', 'true');
                            e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(objetoRango.name)}&background=0f1923&color=ff4655&size=128&font-size=0.33`;
                          }}
                        />
                     </div>
                     <div className="font-black text-white text-2xl uppercase tracking-[0.15em] mt-3 drop-shadow-md">{objetoRango.name}</div>
                     <div className="text-[11px] text-[#ff4655] font-bold tracking-widest mt-1 uppercase flex items-center gap-1.5">
                        <i className="fa-solid fa-location-crosshairs"></i> {perfil.region} SERVER
                     </div>
                  </div>

                  {perfil.mainChamps && (
                    <div className="mt-6 w-full">
                      <div className="flex justify-center gap-3">
                        {perfil.mainChamps.split(',').map((champ, idx) => {
                           const nombreLimpio = champ.trim();
                           if(!nombreLimpio) return null;
                           return (
                             <div key={idx} className="w-12 h-12 bg-zinc-800 rounded-sm overflow-hidden relative border-b-[3px] border-[#ff4655] shadow-lg" title={nombreLimpio}>
                               <img src={obtenerImagenCampeon(perfil.game, nombreLimpio, iconosValorant, versionLol)} className="w-full h-full object-cover scale-110" 
                                  onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${nombreLimpio}&background=0f1923&color=fff&size=64` }}
                               />
                             </div>
                           )
                        })}
                      </div>
                    </div>
                  )}

                  <div className="mt-6 w-full text-center px-4 bg-black/30 p-3 border-l-[3px] border-[#ff4655] relative">
                    <div className="absolute top-0 left-0 w-1 h-1 bg-[#ff4655] -translate-x-[3px] -translate-y-[3px]" />
                    <div className="absolute bottom-0 left-0 w-1 h-1 bg-[#ff4655] -translate-x-[3px] translate-y-[3px]" />
                    <p className="text-xs text-zinc-300 leading-relaxed font-medium">
                       {perfil.aboutMe}
                    </p>
                  </div>

                  <button className="w-full mt-6 py-3.5 bg-[#ff4655] hover:bg-[#ff4655]/90 text-white font-black text-[11px] uppercase tracking-widest transition-colors flex items-center justify-center gap-2 rounded-sm relative overflow-hidden group">
                     <span className="absolute top-0 left-[-100%] w-1/2 h-full bg-white/20 skew-x-[-20deg] group-hover:left-[200%] transition-all duration-700 ease-in-out" />
                     <i className="fa-solid fa-paper-plane"></i> INITIATE COMMS
                  </button>
                </div>
              </div>
            );
          }

          // --- DEFAULT FALLBACK LAYOUT ---
          return (
            <div className="w-full max-w-[340px] bg-[#111214] rounded-xl p-6 shadow-2xl mx-auto text-center border border-zinc-800">
               <img src={perfil.avatarUrl} className="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-zinc-800" />
               <h2 className="text-xl font-bold text-white">{perfil.gamerTag}</h2>
               <p className="text-sm text-zinc-400 mb-6">{perfil.game}</p>
               <div className="bg-[#1e1f22] p-3 rounded-lg text-sm text-zinc-300 mb-6">
                 {perfil.aboutMe}
               </div>
               <button className="w-full py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg font-bold transition-colors">
                 Connect
               </button>
            </div>
          );
        }

        // Renderizar la aplicación en el div con id "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
